specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Workable
providerId: workable
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
  - HR
  - ATS
  - Recruiting
  - Plans
description: >-
  Workable publishes three monthly plans — Standard, Premier, Enterprise —
  with a 20% discount for annual commitment. Standard is the entry tier and
  add-ons (Texting+, Video Interviews+, Assessments+, Performance Reviews+)
  are available a la carte; Premier and Enterprise include them.
sources:
  - https://www.workable.com/pricing
plans:
  - id: workable-standard
    name: Standard
    type: subscription
    description: Core ATS, sourcing, candidate management, and reporting.
    entries:
      - label: Monthly
        name: workable_standard_monthly
        type: flat
        metric: subscription
        timeFrame: monthly
        unit: 1
        price: '299'
        currency: USD
        userMultiplied: false
      - label: Annual (20% off)
        name: workable_standard_annual
        type: flat
        metric: subscription
        timeFrame: yearly
        unit: 1
        price: '3588'
        currency: USD
        userMultiplied: false
    elements:
      - name: AI sourcing and active job board distribution
      - name: Candidate pipeline management and stages
      - name: Calendar / video meeting integrations
      - name: REST API and webhook access
  - id: workable-premier
    name: Premier
    type: subscription
    description: >-
      Standard plus Texting+, Video Interviews+, and Assessments+ included
      out of the box.
    entries:
