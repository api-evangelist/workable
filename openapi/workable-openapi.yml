    post:
      tags: [Candidates]
      summary: Add candidate rating
      operationId: addCandidateRating
      responses:
        "201": { description: Created }
    put:
      tags: [Candidates]
      summary: Update candidate rating
      operationId: updateCandidateRating
      responses:
        "200": { description: OK }
  /candidates/{id}/tags:
    parameters:
