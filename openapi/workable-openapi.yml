      operationId: getEvent
      responses:
        "200": { description: OK }
  /candidates:
    get:
      tags: [Candidates]
      summary: List candidates
      operationId: listCandidates
      responses:
        "200": { description: OK }
  /candidates/{id}:
    parameters:
      - in: path
        name: id
        required: true
