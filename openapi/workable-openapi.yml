openapi: 3.1.0
info:
  title: Workable API
  description: |
    REST API for Workable's recruiting and HR platform — manage jobs, candidates,
    employees, departments, members, offers, requisitions, time tracking, time off,
    review cycles, and subscriptions.
  version: "3.21.0"
  contact:
    name: Workable
    url: https://workable.readme.io/
servers:
  - url: https://{subdomain}.workable.com/spi/v3
    description: Workable API
    variables:
      subdomain:
        default: example
        description: Workable account subdomain
security:
  - bearerAuth: []
tags:
  - name: Accounts
  - name: Departments
  - name: Members
  - name: Recruiters
  - name: Jobs
  - name: Candidates
  - name: Employees
  - name: Offers
  - name: Requisitions
  - name: ReviewCycles
  - name: TimeTracking
  - name: TimeOff
  - name: Subscriptions
  - name: CustomAttributes
  - name: Events
  - name: Stages
paths:
  /accounts:
    get:
      tags: [Accounts]
      summary: List accounts
      operationId: listAccounts
      responses:
        "200": { description: OK }
  /accounts/{subdomain}:
    parameters:
      - in: path
        name: subdomain
        required: true
        schema: { type: string }
    get:
      tags: [Accounts]
      summary: Get account by subdomain
      operationId: getAccount
      responses:
        "200": { description: OK }
  /collaboration_permissions:
    get:
      tags: [Accounts]
      summary: List collaboration permissions
      operationId: listCollaborationPermissions
      responses:
        "200": { description: OK }
  /legal_entities:
    get:
      tags: [Accounts]
      summary: List legal entities
      operationId: listLegalEntities
      responses:
        "200": { description: OK }
  /permission_sets:
    get:
      tags: [Accounts]
      summary: List permission sets
      operationId: listPermissionSets
      responses:
        "200": { description: OK }
  /work_schedules:
    get:
      tags: [Accounts]
      summary: List work schedules
      operationId: listWorkSchedules
      responses:
        "200": { description: OK }
  /departments:
    get:
      tags: [Departments]
      summary: List departments
      operationId: listDepartments
      responses:
        "200": { description: OK }
    post:
      tags: [Departments]
      summary: Create department
      operationId: createDepartment
      responses:
        "201": { description: Created }
    put:
      tags: [Departments]
      summary: Update department
      operationId: updateDepartment
      responses:
        "200": { description: OK }
  /departments/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    delete:
      tags: [Departments]
      summary: Delete department
      operationId: deleteDepartment
      responses:
        "204": { description: No Content }
  /departments/{id}/merge:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    post:
      tags: [Departments]
      summary: Merge departments
      operationId: mergeDepartments
      responses:
        "200": { description: OK }
  /members:
    get:
      tags: [Members]
      summary: List members
      operationId: listMembers
      responses:
        "200": { description: OK }
    put:
      tags: [Members]
      summary: Update members
      operationId: updateMembers
      responses:
        "200": { description: OK }
  /members/invite:
    post:
      tags: [Members]
      summary: Invite member
      operationId: inviteMember
      responses:
        "201": { description: Created }
  /members/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    delete:
      tags: [Members]
      summary: Delete member
      operationId: deleteMember
      responses:
        "204": { description: No Content }
  /members/{id}/enable:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    post:
      tags: [Members]
      summary: Enable member
      operationId: enableMember
      responses:
        "200": { description: OK }
  /recruiters:
    get:
      tags: [Recruiters]
      summary: List recruiters
      operationId: listRecruiters
      responses:
        "200": { description: OK }
  /jobs:
