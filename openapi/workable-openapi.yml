      tags: [TimeTracking]
      summary: List time entries
      operationId: listTimeEntries
      responses:
        "200": { description: OK }
    post:
      tags: [TimeTracking]
      summary: Create time entry
      operationId: createTimeEntry
      responses:
        "201": { description: Created }
  /time-tracking/employees/{id}/time-entries:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    post:
      tags: [TimeTracking]
      summary: Create employee time entry
      operationId: createEmployeeTimeEntry
      responses:
        "201": { description: Created }
  /time-tracking/employees/{id}/time-entries/{uuid}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
      - in: path
        name: uuid
        required: true
        schema: { type: string }
    put:
      tags: [TimeTracking]
      summary: Update employee time entry
      operationId: updateEmployeeTimeEntry
      responses:
        "200": { description: OK }
    delete:
      tags: [TimeTracking]
      summary: Delete employee time entry
      operationId: deleteEmployeeTimeEntry
      responses:
        "204": { description: No Content }
  /timeoff/requests:
