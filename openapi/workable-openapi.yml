        "200": { description: OK }
  /employees/{id}/documents:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    get:
      tags: [Employees]
      summary: List employee documents
      operationId: listEmployeeDocuments
      responses:
        "200": { description: OK }
    post:
      tags: [Employees]
      summary: Upload employee document
      operationId: uploadEmployeeDocument
      responses:
        "201": { description: Created }
  /employee_fields:
    get:
      tags: [Employees]
      summary: List employee fields
      operationId: listEmployeeFields
      responses:
        "200": { description: OK }
  /offers/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    get:
      tags: [Offers]
      summary: Get offer
      operationId: getOffer
      responses:
        "200": { description: OK }
  /offers/{id}/approve:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    post:
      tags: [Offers]
      summary: Approve offer
      operationId: approveOffer
      responses:
        "200": { description: OK }
  /offers/{id}/reject:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    post:
      tags: [Offers]
      summary: Reject offer
      operationId: rejectOffer
      responses:
        "200": { description: OK }
  /requisitions:
    get:
      tags: [Requisitions]
      summary: List requisitions
      operationId: listRequisitions
      responses:
        "200": { description: OK }
    post:
      tags: [Requisitions]
      summary: Create requisition
      operationId: createRequisition
      responses:
        "201": { description: Created }
    patch:
      tags: [Requisitions]
      summary: Update requisitions
      operationId: patchRequisitions
      responses:
        "200": { description: OK }
  /requisitions/{code}:
    parameters:
      - in: path
        name: code
        required: true
        schema: { type: string }
    get:
      tags: [Requisitions]
      summary: Get requisition
      operationId: getRequisition
      responses:
        "200": { description: OK }
  /requisitions/{code}/approve:
    parameters:
      - in: path
        name: code
        required: true
        schema: { type: string }
    post:
      tags: [Requisitions]
      summary: Approve requisition
      operationId: approveRequisition
      responses:
        "200": { description: OK }
  /requisitions/{code}/reject:
    parameters:
      - in: path
        name: code
        required: true
        schema: { type: string }
    post:
      tags: [Requisitions]
      summary: Reject requisition
      operationId: rejectRequisition
      responses:
        "200": { description: OK }
  /review-cycles/templates:
    get:
      tags: [ReviewCycles]
      summary: List review cycle templates
      operationId: listReviewCycleTemplates
      responses:
        "200": { description: OK }
    post:
      tags: [ReviewCycles]
      summary: Create review cycle template
      operationId: createReviewCycleTemplate
      responses:
        "201": { description: Created }
  /review-cycles/templates/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    get:
      tags: [ReviewCycles]
      summary: Get review cycle template
      operationId: getReviewCycleTemplate
      responses:
        "200": { description: OK }
  /time-tracking/time-entries:
