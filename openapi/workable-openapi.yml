      tags: [Jobs]
      summary: List jobs
      operationId: listJobs
      responses:
        "200": { description: OK }
  /jobs/{shortcode}:
    parameters:
      - in: path
        name: shortcode
        required: true
        schema: { type: string }
    get:
      tags: [Jobs]
      summary: Get job by shortcode
      operationId: getJob
      responses:
        "200": { description: OK }
  /jobs/{shortcode}/application_form:
    parameters:
      - in: path
        name: shortcode
        required: true
        schema: { type: string }
    get:
      tags: [Jobs]
      summary: Get job application form
      operationId: getJobApplicationForm
      responses:
        "200": { description: OK }
  /jobs/{shortcode}/questions:
    parameters:
      - in: path
        name: shortcode
        required: true
        schema: { type: string }
    get:
      tags: [Jobs]
      summary: Get job questions
      operationId: getJobQuestions
      responses:
        "200": { description: OK }
  /jobs/{shortcode}/custom_attributes:
    parameters:
      - in: path
        name: shortcode
        required: true
        schema: { type: string }
    get:
      tags: [Jobs]
      summary: Get job custom attributes
      operationId: getJobCustomAttributes
      responses:
        "200": { description: OK }
  /jobs/{shortcode}/members:
    parameters:
      - in: path
        name: shortcode
        required: true
        schema: { type: string }
    get:
      tags: [Jobs]
      summary: Get job members
      operationId: getJobMembers
      responses:
        "200": { description: OK }
  /jobs/{shortcode}/stages:
    parameters:
      - in: path
        name: shortcode
        required: true
        schema: { type: string }
    get:
      tags: [Jobs]
      summary: Get job stages
      operationId: getJobStages
      responses:
        "200": { description: OK }
  /jobs/{shortcode}/recruiters:
    parameters:
      - in: path
        name: shortcode
        required: true
        schema: { type: string }
    get:
      tags: [Jobs]
      summary: Get job recruiters
      operationId: getJobRecruiters
      responses:
        "200": { description: OK }
  /jobs/{shortcode}/activities:
    parameters:
      - in: path
        name: shortcode
        required: true
        schema: { type: string }
    get:
      tags: [Jobs]
      summary: Get job activities
      operationId: getJobActivities
      responses:
        "200": { description: OK }
  /jobs/{shortcode}/candidates:
    parameters:
      - in: path
        name: shortcode
        required: true
        schema: { type: string }
    post:
      tags: [Candidates]
      summary: Create candidate on job
      operationId: createJobCandidate
      responses:
        "201": { description: Created }
  /stages:
    get:
      tags: [Stages]
      summary: List stages
      operationId: listStages
      responses:
        "200": { description: OK }
  /events:
    get:
      tags: [Events]
      summary: List events
      operationId: listEvents
      responses:
        "200": { description: OK }
  /events/{id}:
