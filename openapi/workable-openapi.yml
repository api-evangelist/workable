        name: id
        required: true
        schema: { type: string }
    post:
      tags: [Candidates]
      summary: Add candidate comment
      operationId: addCandidateComment
      responses:
        "201": { description: Created }
  /candidates/{id}/copy:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    post:
      tags: [Candidates]
      summary: Copy candidate
      operationId: copyCandidate
      responses:
        "201": { description: Created }
  /candidates/{id}/disqualify:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    post:
      tags: [Candidates]
      summary: Disqualify candidate
      operationId: disqualifyCandidate
      responses:
        "200": { description: OK }
  /candidates/{id}/revert:
    parameters:
      - in: path
        name: id
        required: true
