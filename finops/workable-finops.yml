specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Workable
providerId: workable
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
  - HR
  - ATS
  - Recruiting
  - FinOps
  - FOCUS
description: >-
  Workable's billing model is monthly subscription with optional add-ons
  (Texting+, Video Interviews+, Assessments+, Performance Reviews+) and a
  20% annual discount. This artifact maps Workable charges to FOCUS columns
  for FinOps allocation across recruiting cost centers.
sources:
  - https://www.workable.com/pricing
  - https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Workable
serviceCategory: HR
billingModel:
  pricingCategory: Subscription
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Adjustment
    - Tax
focusColumns:
  ServiceName: Workable
  ServiceCategory: HR
  ProviderName: Workable
  PublisherName: Workable
  InvoiceIssuerName: Workable
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: workable_subscription
    description: Standard / Premier / Enterprise monthly or annual subscription.
    unit: subscription-month
    aggregation: sum
    dimensions:
      - tier
      - cost_center
  - name: workable_addons
    description: Texting+ / Video Interviews+ / Assessments+ / Performance Reviews+ add-ons (Standard plan only).
    unit: addon-month
    aggregation: sum
    dimensions:
      - addon
      - cost_center
  - name: pass_through_costs
    description: Premium job board postings, third-party assessments, and SMS pass-through.
    unit: events
    aggregation: sum
    dimensions:
      - service
principles:
  - name: Visibility
    description: >-
      Pull monthly Workable invoices and renewal proposals; reconcile
      against actual usage of texting and video minutes.
  - name: Allocation
    description: >-
      Allocate Workable subscription cost to recruiting / talent functions;
      tag add-ons by department.
  - name: Optimization
    description: >-
      Compare Premier (bundled) vs. Standard + add-ons monthly cost; opt
      for the bundle when 2+ add-ons are active.
  - name: Accountability
    description: >-
      Designate Talent Operations as the contract owner; review at renewal
      and lock 20% annual discount.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
